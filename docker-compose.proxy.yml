version: '3.8'

# Docker Compose for PROXY VM
# This VM runs only the reverse proxy (nginx) and monitoring for the proxy layer

services:

# Reverse proxy - Entry point for all traffic
  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - APP_VM_HOST=${APP_VM_HOST}
      - APP_VM_PORT=${APP_VM_PORT:-5000}
    restart: unless-stopped
    networks:
      - proxy-network

# Monitoring for proxy VM
  prometheus-proxy:
    image: prom/prometheus:latest
    container_name: prometheus-proxy
    volumes:
      - ./monitoring/prometheus.proxy.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - proxy-network

  grafana-proxy:
    image: grafana/grafana:latest
    container_name: grafana-proxy
    ports:
      - "3000:3000"
    volumes:
      - grafana-proxy-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    restart: unless-stopped
    networks:
      - proxy-network

  node-exporter-proxy:
    image: prom/node-exporter:latest
    container_name: node-exporter-proxy
    pid: host
    network_mode: host
    privileged: true
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge

volumes:
  grafana-proxy-data:
