<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Recipe Cookbook{% endblock %}</title>

    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🍳 Awesome Recipe Cookbook</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/recipes">Recipes</a>
                {% if request.state.user %}
                    <span style="color: #666;">👤 Logged in as <strong>{{ request.state.user.name }}</strong></span>
                    <a href="/auth/logout">Logout</a>
                {% else %}
                    <span style="color: #999;">📭 You are not logged in</span>
                    <a href="/auth/login">Login</a>
                    <a href="/auth/signup">Sign Up</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Awesome Recipe Cookbook</p>
        </div>
    </footer>
</body>
</html>
