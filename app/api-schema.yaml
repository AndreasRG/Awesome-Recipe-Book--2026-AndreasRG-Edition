openapi: 3.0.3
info:
  title: Recipe Cookbook API
  version: 1.0.0
  description: A recipe cookbook API with detailed cooking instructions and ingredient measurements
paths:
  /:
    get:
      operationId: home
      description: Home page displaying all recipes with 90s styling
      tags:
      - web
      responses:
        '200':
          description: HTML page with recipe list
          content:
            text/html:
              schema:
                type: string

  /recipes/{id}/:
    get:
      operationId: recipe_detail
      description: Recipe detail page with full cooking instructions
      tags:
      - web
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Recipe ID
        required: true
      responses:
        '200':
          description: HTML page with recipe details
          content:
            text/html:
              schema:
                type: string

  /api/user/create/:
    post:
      operationId: user_create_create
      description: Create a new user in the system.
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: ''

  /api/user/me/:
    get:
      operationId: user_me_retrieve
      description: Manage the authenticated user.
      tags:
      - user
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: ''
    put:
      operationId: user_me_update
      description: Manage the authenticated user.
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: ''
    patch:
      operationId: user_me_partial_update
      description: Manage the authenticated user.
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: ''

  /api/user/token/:
    post:
      operationId: user_token_create
      description: Create a new auth token for user.
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCreate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''

  /api/recipe/recipes/:
    get:
      operationId: recipe_recipes_list
      description: View for manage recipe APIs.
      tags:
      - recipe
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeResponse'
          description: ''
    post:
      operationId: recipe_recipes_create
      description: View for manage recipe APIs.
      tags:
      - recipe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
          description: ''

  /api/recipe/recipes/{id}/:
    get:
      operationId: recipe_recipes_retrieve
      description: View for manage recipe APIs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this recipe.
        required: true
      tags:
      - recipe
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'

  /api/recipe/tags/{id}/:
    put:
      operationId: recipe_tags_update
      description: Manage tags in the database.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this tag.
        required: true
      tags:
      - recipe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
          description: ''
    patch:
      operationId: recipe_tags_partial_update
      description: Manage tags in the database.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this tag.
        required: true
      tags:
      - recipe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTagRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
          description: ''
    delete:
      operationId: recipe_tags_destroy
      description: Manage tags in the database.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this tag.
        required: true
      tags:
      - recipe
      responses:
        '204':
          description: No response body

components:
  schemas:
    UserCreate:
      type: object
      description: Schema for creating a new user.
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
      required:
      - email
      - password
      - name

    UserUpdate:
      type: object
      description: Schema for updating user information.
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string

    PatchedUserUpdate:
      type: object
      description: Schema for partially updating user information.
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string

    UserResponse:
      type: object
      description: Schema for user response.
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
      required:
      - id
      - email
      - name

    TokenCreate:
      type: object
      description: Schema for token creation (authentication).
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password

    TokenResponse:
      type: object
      description: Schema for token response.
      properties:
        email:
          type: string
          format: email
        token:
          type: string
      required:
      - email
      - token

    IngredientWithAmountResponse:
      type: object
      description: Schema for ingredient response with amount and unit.
      properties:
        id:
          type: integer
        name:
          type: string
        amount:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
      required:
      - id
      - name

    TagResponse:
      type: object
      description: Schema for tag response.
      properties:
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name

    TagRequest:
      type: object
      description: Schema for updating a tag.
      properties:
        name:
          type: string
      required:
      - name

    PatchedTagRequest:
      type: object
      description: Schema for partially updating a tag.
      properties:
        name:
          type: string

    RecipeCreate:
      type: object
      description: Schema for creating a recipe.
      properties:
        title:
          type: string
        time_minutes:
          type: integer
        price:
          type: string
        link:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: integer
          nullable: true
        ingredients:
          type: array
          items:
            type: object
          nullable: true
      required:
      - title
      - time_minutes
      - price

    RecipeResponse:
      type: object
      description: Schema for recipe response.
      properties:
        id:
          type: integer
        title:
          type: string
        time_minutes:
          type: integer
        price:
          type: string
        link:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientWithAmountResponse'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagResponse'
      required:
      - id
      - title
      - time_minutes
      - price
      - name
      - password
