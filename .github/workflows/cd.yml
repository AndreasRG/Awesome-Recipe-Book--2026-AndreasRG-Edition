name: Build, Push and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Extract short SHA
      run: echo "SHA_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Log in to GHCR
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u andreasrg --password-stdin

    - name: Build image with SHA + latest
      run: |
        docker build --no-cache \
          -t ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${{ env.SHA_TAG }} \
          -t ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:latest \
          .

    - name: Push images
      run: |
        docker push ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${{ env.SHA_TAG }}
        docker push ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:latest

  deploy-app-vm:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Extract short SHA
      run: echo "SHA_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Deploy to APP VM
      uses: appleboy/ssh-action@v1.0.3
      env:
        SHA_TAG: ${{ env.SHA_TAG }}
      with:
        host: ${{ secrets.APP_VM_HOST }}
        username: ${{ secrets.APP_VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: SHA_TAG
        script: |
          cd ~/Awesome-Recipe-Book--2026-AndreasRG-Edition

          git fetch --all
          git reset --hard origin/main

          echo "SHA_TAG=$SHA_TAG" > .env.app

          docker compose -f docker-compose.app.yml pull

          chmod +x scripts/rolling_update.sh

          ./scripts/rolling_update.sh

          docker image prune -f


  deploy-proxy-vm:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Extract short SHA
      run: echo "SHA_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Deploy to PROXY VM (Blue-Green Strategy)
      uses: appleboy/ssh-action@v1.0.3
      env:
        SHA_TAG: ${{ env.SHA_TAG }}
        APP_VM_HOST: ${{ secrets.APP_VM_HOST }}
        GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
      with:
        host: ${{ secrets.PROXY_VM_HOST }}
        username: ${{ secrets.PROXY_VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: SHA_TAG,APP_VM_HOST,GRAFANA_PASSWORD
        script: |
          cd ~/Awesome-Recipe-Book--2026-AndreasRG-Edition

          # Always sync repo with GitHub
          git fetch --all
          git reset --hard origin/main

          # Prepare environment variables
          echo "SHA_TAG=$SHA_TAG" > .env.proxy
          echo "APP_VM_HOST=$APP_VM_HOST" >> .env.proxy
          echo "GRAFANA_PASSWORD=$GRAFANA_PASSWORD" >> .env.proxy
          
          # Set up nginx config with environment variable substitution
          envsubst '${APP_VM_HOST}' < reverse-proxy/nginx.conf.template > reverse-proxy/nginx.conf

          # Generate Prometheus config
          envsubst '${APP_VM_HOST}' < monitoring/prometheus.proxy.yml.template > monitoring/prometheus.proxy.yml
          
          # Initialize state file if it doesn't exist (default to blue)
          if [ ! -f .active-proxy ]; then
            echo "blue" > .active-proxy
          fi
          
          # Pull latest images for both blue and green services
          docker compose -f docker-compose.proxy-blue.yml pull
          docker compose -f docker-compose.proxy-green.yml pull
          
          # Run blue-green deployment script
          chmod +x scripts/blue_green_proxy_deploy.sh
          ./scripts/blue_green_proxy_deploy.sh
          
          # Clean up unused images and containers
          docker image prune -f --filter "until=24h"
          docker container prune -f --filter "until=24h"