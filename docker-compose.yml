version: "3.9"

services:
  app:
    build: .
    container_name: exam-app
    expose:
      - "5000"
    restart: unless-stopped

  reverse-proxy:
    image: nginx:latest
    container_name: exam-reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
