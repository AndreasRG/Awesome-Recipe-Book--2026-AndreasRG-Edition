version: '3.8'

# ⚠️  DEPRECATED - This file is now split into separate files for 2-VM architecture
# 
# Please use instead:
#   - docker-compose.app.yml   (for App VM)
#   - docker-compose.proxy.yml (for Proxy VM)
#
# For setup instructions, see: DEPLOYMENT_2VM_SETUP.md
#
# This file is kept for reference only. It represents the old single-VM architecture.

services:

# ❌ THIS CONFIGURATION IS NO LONGER USED ❌
# The content below is legacy and should NOT be deployed

# Application instances
  app1:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: app1
    expose:
      - "5000"
    restart: unless-stopped
  app2:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: app2
    expose:
      - "5000"
    restart: unless-stopped
  app3:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: app3
    expose:
      - "5000"
    restart: unless-stopped


# Reverse proxy
  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    restart: unless-stopped


# Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    network_mode: host
    privileged: true
    restart: unless-stopped

volumes:
  grafana-data:
