services:
  app1:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: app1
    expose:
      - "5000"
    restart: unless-stopped

  app2:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: app2
    expose:
      - "5000"
    restart: unless-stopped

  app3:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: app3
    expose:
      - "5000"
    restart: unless-stopped

  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    restart: unless-stopped
