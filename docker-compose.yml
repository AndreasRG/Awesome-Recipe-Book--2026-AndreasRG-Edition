services:
  app:
    image: ghcr.io/andreasrg/awesome-recipe-book--2026-andreasrg-edition:${SHA_TAG}
    container_name: exam-app
    expose:
      - "5000"
    pull_policy: always
    restart: unless-stopped

  reverse-proxy:
    image: nginx:latest
    container_name: exam-reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped